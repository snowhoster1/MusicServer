name: AI Music Generation & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Generate music (Suno or fallback)
        env:
          SUNO_API_KEY: ${{ secrets.SUNO_API_KEY }}
          SUNO_ENDPOINT: ${{ secrets.SUNO_ENDPOINT }} # optional, provider endpoint
        run: |
          python scripts/generate_and_package.py --out-dir ./publish --title "automated-song"

      - name: Deploy to Azure App Service (Zip Deploy)
        uses: azure/webapps-deploy@v2
        with:
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./deploy_package.zip
