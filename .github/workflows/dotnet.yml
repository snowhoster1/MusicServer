name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'
    
    - name: Restore
      run: dotnet restore
    
    - name: Build
      run: dotnet build -c Release --no-restore
    
    - name: Publish
      run: dotnet publish -c Release --no-build -o ./publish
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: music-server
        path: ./publish
        retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: music-server
        path: ./publish
    
    - name: Azure login
      run: |
        echo "${{ secrets.AZURE_PUBLISH_PROFILE }}" > publishprofile.xml
        az webapp deployment secret --help || true
        az login --service-principal --username "$AZURE_APP_ID" --password "$AZURE_PASSWORD" --tenant "$AZURE_TENANT_ID" || true
    
    - name: Azure WebApp Deploy via Zip
      run: |
        echo "${{ secrets.AZURE_PUBLISH_PROFILE }}" > publishprofile.xml
        # Extract values using grep/sed
        PUBLISH_URL=$(grep -oP 'publishUrl="\K[^"]+' publishprofile.xml)
        PUBLISH_USER=$(grep -oP 'userName="\$\K[^"]+' publishprofile.xml)
        PUBLISH_PWD=$(grep -oP 'userPWD="\K[^"]+' publishprofile.xml)
        
        # Upload using curl
        curl -X POST -u "$PUBLISH_USER:$PUBLISH_PWD" \
          -H "Content-Type: application/zip" \
          --data-binary @publish.zip \
          "$PUBLISH_URL/api/zipdeploy"
