name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'
    
    - name: Restore
      run: dotnet restore MusicServer/MusicServer.csproj
    
    - name: Build
      run: dotnet build MusicServer/MusicServer.csproj -c Release --no-restore
    
    - name: Publish
      run: dotnet publish MusicServer/MusicServer.csproj -c Release --no-build -o ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: music-server
        path: ./publish
    
    - name: Deploy to Render
      uses: render-oss/deploy-to-render@v1
      with:
        apiKey: ${{ secrets.RENDER_API_KEY }}
        serviceId: ${{ secrets.RENDER_SERVICE_ID }}
